<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARK · Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root { --cyan:#00f5ff; --magenta:#ff006e; --bg:#020812; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; }

body {
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif;
}

/* ── BACKGROUND ── */
#starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }

.grid-overlay {
  position:fixed; inset:0; pointer-events:none; z-index:1;
  background-image:
    linear-gradient(rgba(0,245,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,.03) 1px, transparent 1px);
  background-size:60px 60px;
}

.scan-line {
  position:fixed; top:0; left:0; width:100%; height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,245,255,.25),transparent);
  animation:scanAnim 6s linear infinite; pointer-events:none; z-index:2;
}
@keyframes scanAnim { 0%{top:0} 100%{top:100vh} }

/* ── OVERLAY ── */
#overlay {
  position:fixed; inset:0; background:#020812; z-index:9999;
  opacity:0; pointer-events:none; transition:opacity 0.55s ease;
}
#overlay.show { opacity:1; pointer-events:all; }

/* ── CENTER ── */
.center-wrap {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center; gap:48px;
  text-align:center; padding:0 24px;
  animation:holoBlink 9s ease-in-out infinite;
}
@keyframes holoBlink {
  0%,93%,100%{opacity:1} 94%{opacity:.82} 95%{opacity:1} 97%{opacity:.88}
}

/* STARK */
.stark-title {
  font-family:'Orbitron',monospace; font-weight:900;
  font-size:clamp(5rem,16vw,11rem); letter-spacing:.28em; line-height:1;
  background:linear-gradient(160deg,
    #fff 0%,#cce8f8 18%,#a0d4ee 36%,
    #fff 50%,#bfe0f7 64%,#dff2ff 82%,#fff 100%);
  background-size:300% 300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 4s ease-in-out infinite;
  filter:
    drop-shadow(0 0 6px rgba(200,235,255,1))
    drop-shadow(0 0 22px rgba(100,200,255,.7))
    drop-shadow(0 0 70px rgba(0,245,255,.4));
}
@keyframes shimmer {
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}

/* GLASS CARD */
.glass-card {
  position:relative; padding:44px 68px 52px; border-radius:24px;
  background:rgba(180,230,255,.06); backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  display:flex; flex-direction:column; align-items:center; gap:44px;
  box-shadow:
    0 8px 48px rgba(0,245,255,.13),
    0 2px 16px rgba(180,230,255,.09),
    inset 0 1px 0 rgba(255,255,255,.14),
    inset 0 -1px 0 rgba(0,245,255,.07);
}

/* animasyonlu hologram border */
.glass-card::before {
  content:''; position:absolute; inset:-1px; border-radius:25px; padding:1px;
  background:linear-gradient(120deg,
    rgba(255,255,255,.6),rgba(0,245,255,.45),
    rgba(180,220,255,.6),rgba(255,255,255,.3),rgba(0,245,255,.55));
  background-size:300% 300%; animation:shimmer 5s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude; z-index:-1;
}

/* iç tarama çizgisi */
.glass-card::after {
  content:''; position:absolute; inset:0; border-radius:24px;
  background:repeating-linear-gradient(
    180deg,transparent 0px,rgba(0,245,255,.022) 2px,transparent 4px);
  animation:holoScan 3.5s linear infinite; pointer-events:none;
}
@keyframes holoScan { 0%{background-position:0 0} 100%{background-position:0 80px} }

.subtitle {
  font-family:'Orbitron',monospace; font-weight:700;
  font-size:clamp(1rem,3vw,2rem); letter-spacing:.14em;
  text-transform:uppercase; line-height:1.55;
  background:linear-gradient(135deg,
    #f0faff 0%,#b8dcf0 22%,#fff 44%,#c4e8ff 66%,#e8f8ff 88%,#fff 100%);
  background-size:200% 200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 5s ease-in-out infinite reverse;
  filter:drop-shadow(0 0 5px rgba(200,240,255,.9)) drop-shadow(0 0 16px rgba(0,245,255,.45));
}

/* ENTER BUTTON */
.btn-enter {
  position:relative; z-index:1;
  font-family:'Orbitron',monospace; font-weight:700;
  font-size:.95rem; letter-spacing:.22em; text-transform:uppercase;
  color:#e8f8ff; padding:17px 60px; border-radius:13px;
  background:rgba(0,245,255,.08); backdrop-filter:blur(12px);
  border:none; cursor:pointer; overflow:hidden;
  transition:transform .3s ease, box-shadow .3s ease, filter .3s ease;
  box-shadow:0 0 18px rgba(0,245,255,.2),inset 0 1px 0 rgba(255,255,255,.12);
  filter:drop-shadow(0 0 8px rgba(0,245,255,.35));
}
.btn-enter::before {
  content:''; position:absolute; inset:-1px; border-radius:14px; padding:1px;
  background:linear-gradient(90deg,
    rgba(255,255,255,.7),rgba(0,245,255,.5),
    rgba(180,220,255,.7),rgba(0,245,255,.4),rgba(255,255,255,.7));
  background-size:300% 300%; animation:shimmer 3.5s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude; z-index:-1;
}
.btn-enter::after {
  content:''; position:absolute; top:0; left:-75%; width:50%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-20deg); animation:btnSweep 3s ease-in-out infinite;
}
@keyframes btnSweep { 0%{left:-75%} 60%,100%{left:130%} }
.btn-enter:hover {
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 44px rgba(0,245,255,.45);
  filter:drop-shadow(0 0 20px rgba(0,245,255,.65));
}
.btn-enter:active { transform:translateY(0) scale(.98); }
</style>
</head>
<body>

<div id="overlay"></div>
<canvas id="starfield"></canvas>
<div class="grid-overlay"></div>
<div class="scan-line"></div>

<div class="center-wrap">
  <div class="stark-title">STARK</div>
  <div class="glass-card">
    <div class="subtitle">Kozmik Veri Ayıklama<br>Ve İşleme Hattı (Pipeline)</div>
    <button class="btn-enter" id="btnEnter">✦ &nbsp;Anasayfa&nbsp; ✦</button>
  </div>
</div>

<script>
/* STARFIELD */
(function(){
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');let s=[];
  const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
  const init=()=>{s=[];for(let i=0;i<230;i++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.6,a:Math.random(),sp:.002+Math.random()*.003});};
  const draw=()=>{
    ctx.clearRect(0,0,c.width,c.height);
    const t=Date.now()*.001;
    s.forEach(p=>{
      const al=.3+.7*Math.abs(Math.sin(t*p.sp+p.a*10));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,220,240,${al})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  };
  resize();init();draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

/* NAVIGATE → anasayfa.html */
document.getElementById('btnEnter').addEventListener('click',()=>{
  const ov=document.getElementById('overlay');
  ov.classList.add('show');
  setTimeout(()=>{ window.location.href='anasayfa.html'; }, 580);
});
</script>
</body>
</html>
